<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐓ᴇᴀᴍ Kʀɪsʜ | All-in-One Hub</title>
    <style>
        :root {
            --primary: #833ab4;
            --secondary: #fd1d1d;
            --accent: #fcb045;
            --yt-red: #FF0000;
            --dark: #0f0f0f;
            --card: #1a1a1a;
            --text: #e0e0e0;
            --tg-blue: #0088cc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #2a2a2a;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            background: #252525;
            padding: 5px;
            border-radius: 12px;
            margin: 20px 0;
            gap: 5px;
        }

        .tab {
            flex: 1;
            padding: 10px 5px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
            white-space: nowrap;
        }

        .tab.active {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
        }

        .section { display: none; animation: fadeIn 0.4s; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input[type="text"], input[type="file"], select {
            width: 100%;
            padding: 14px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-insta { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; }
        .btn-photo { background: #ffffff; color: #000; }
        .btn-yt { background: var(--yt-red); color: white; }
        .btn-tutorial { background: #333; color: #fff; margin-top: 20px; font-size: 0.8rem; padding: 10px; }
        .btn-tg { background: var(--tg-blue); color: white; margin-top: 10px; font-size: 0.8rem; padding: 10px; }
        .btn:active { transform: scale(0.98); }

        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .result-box { margin-top: 20px; text-align: left; background: #252525; padding: 15px; border-radius: 15px; border: 1px solid #333;}
        .result-box img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .dl-link { display: block; text-align: center; background: #28a745; color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 10px;}

        #tutorialBox {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #000;
            border-radius: 15px;
            border: 1px solid var(--accent);
        }
        #tutorialBox video { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>𝐓ᴇᴀᴍ Kʀɪsʜ Hub</h1>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('insta', this)">𝐈ɴsᴛᴀ</div>
        <div class="tab" onclick="switchTab('yt', this)">𝐘𝐨𝐮𝐓𝐮𝐛𝐞</div>
        <div class="tab" onclick="switchTab('photo', this)">𝐏ʜᴏᴛᴏ ᴛᴏ Lɪɴᴋ</div>
    </div>

    <div id="insta" class="section active">
        <input type="text" id="instaUrl" placeholder="Paste Instagram Link...">
        <button class="btn btn-insta" onclick="downloadInsta()">Get Media</button>
        <div id="loaderInsta" class="loader"></div>
        <div id="resultInsta"></div>
    </div>

    <div id="yt" class="section">
        <input type="text" id="ytUrl" placeholder="Paste YouTube Link...">
        <select id="ytType">
            <option value="mp4">Video (MP4)</option>
            <option value="mp3">Audio (MP3)</option>
        </select>
        <button class="btn btn-yt" onclick="downloadYT()">Get YouTube Media</button>
        <div id="loaderYT" class="loader"></div>
        <div id="resultYT"></div>
    </div>

    <div id="photo" class="section">
        <input type="file" id="photoFile" accept="image/*,video/*">
        <button class="btn btn-photo" onclick="uploadToCatbox()">Generate Link</button>
        <div id="loaderPhoto" class="loader"></div>
        <div id="resultPhoto"></div>
    </div>

    <hr style="border: 0; border-top: 1px solid #333; margin: 25px 0;">

    <button class="btn btn-tutorial" onclick="toggleTutorial()">🎥 Watch Tutorial</button>
    
    <div id="tutorialBox">
        <p style="font-size: 0.9rem; margin-bottom: 10px; color: var(--accent);">How to use 𝐓ᴇᴀᴍ Kʀɪsʜ Hub</p>
        <video id="tutVideo" controls>
            <source src="https://files.catbox.moe/k3690d.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <button class="btn btn-tg" onclick="window.open('https://t.me/krishnetwork', '_blank')">
        📢 Join Team Krish on Telegram
    </button>
</div>

<script>
    function switchTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.forEach(t => t.classList.remove('active')));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        document.getElementById('tutorialBox').style.display = 'none';
        document.getElementById('tutVideo').pause();
    }

    function toggleTutorial() {
        const box = document.getElementById('tutorialBox');
        const isVisible = box.style.display === 'block';
        box.style.display = isVisible ? 'none' : 'block';
        if (isVisible) document.getElementById('tutVideo').pause();
    }

    const PROXY = "https://corsproxy.io/?";

    async function downloadInsta() {
        const url = document.getElementById('instaUrl').value;
        const resDiv = document.getElementById('resultInsta');
        const loader = document.getElementById('loaderInsta');
        if(!url) return alert("Paste a URL!");
        resDiv.innerHTML = ""; loader.style.display = "block";
        try {
            const response = await fetch(PROXY + encodeURIComponent(`https://insta-dl.hazex.workers.dev/?url=${url}`));
            const data = await response.json();
            const media = data.result;
            resDiv.innerHTML = `<div class="result-box"><video width="100%" controls src="${media.url}"></video><a href="${media.url}" target="_blank" class="dl-link">Download MP4</a></div>`;
        } catch(e) { resDiv.innerHTML = "Error fetching Instagram media."; }
        finally { loader.style.display = "none"; }
    }

    async function downloadYT() {
        const url = document.getElementById('ytUrl').value;
        const type = document.getElementById('ytType').value;
        const resDiv = document.getElementById('resultYT');
        const loader = document.getElementById('loaderYT');
        if(!url) return alert("Paste YouTube URL!");
        resDiv.innerHTML = ""; loader.style.display = "block";
        const apiEndpoint = type === 'mp3' ? 'yta' : 'ytv';
        const apiUrl = `https://shrutibots.site/api/${apiEndpoint}?url=${encodeURIComponent(url)}`;
        try {
            const response = await fetch(PROXY + encodeURIComponent(apiUrl));
            const data = await response.json();
            if(data.result) {
                const item = data.result;
                resDiv.innerHTML = `<div class="result-box"><img src="${item.thumb || item.image}"><p><b>Title:</b> ${item.title}</p><a href="${item.dl_url || item.download}" target="_blank" class="dl-link">Download ${type.toUpperCase()}</a></div>`;
            } else { throw new Error(); }
        } catch(e) { resDiv.innerHTML = "Failed to fetch YouTube media."; }
        finally { loader.style.display = "none"; }
    }

    async function uploadToCatbox() {
        const fileInput = document.getElementById('photoFile');
        const resDiv = document.getElementById('resultPhoto');
        const loader = document.getElementById('loaderPhoto');
        if(fileInput.files.length === 0) return alert("Select a file!");
        resDiv.innerHTML = ""; loader.style.display = "block";
        const formData = new FormData();
        formData.append('reqtype', 'fileupload');
        formData.append('fileToUpload', fileInput.files[0]);
        try {
            const response = await fetch(PROXY + encodeURIComponent('https://catbox.moe/user/api.php'), { method: 'POST', body: formData });
            const link = await response.text();
            resDiv.innerHTML = `<div class="result-box"><p>Link Generated:</p><a href="${link.trim()}" target="_blank" style="color:var(--accent)">${link.trim()}</a></div>`;
        } catch(e) { resDiv.innerHTML = "Upload failed."; }
        finally { loader.style.display = "none"; }
    }
</script>

</body>
</html>
