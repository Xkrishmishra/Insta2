<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐓ᴇᴀᴍ Kʀɪsʜ | All-in-One Hub</title>
    <style>
        :root {
            --primary: #833ab4;
            --secondary: #fd1d1d;
            --accent: #fcb045;
            --dark: #0f0f0f;
            --card: #1a1a1a;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #2a2a2a;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            background: #252525;
            padding: 5px;
            border-radius: 12px;
            margin: 25px 0;
        }

        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab.active {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
        }

        .section { display: none; animation: fadeIn 0.4s; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 14px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-insta { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; }
        .btn-photo { background: #ffffff; color: #000; }
        .btn:active { transform: scale(0.98); }

        #resultInsta, #resultPhoto { margin-top: 20px; }
        
        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .video-box video { width: 100%; border-radius: 12px; }
        .link-box {
            background: #252525;
            padding: 15px;
            border-radius: 12px;
            word-break: break-all;
            border: 1px dashed var(--accent);
        }
        .link-box a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>𝐓ᴇᴀᴍ Kʀɪsʜ Hub</h1>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('insta', this)">𝐈ɴsᴛᴀ Dʟ</div>
        <div class="tab" onclick="switchTab('photo', this)">𝐏ʜᴏᴛᴏ ᴛᴏ Lɪɴᴋ</div>
    </div>

    <div id="insta" class="section active">
        <input type="text" id="instaUrl" placeholder="Paste Instagram Link here...">
        <button class="btn btn-insta" onclick="downloadInsta()">Get Media</button>
        <div id="loaderInsta" class="loader"></div>
        <div id="resultInsta"></div>
    </div>

    <div id="photo" class="section">
        <input type="file" id="photoFile" accept="image/*,video/*">
        <button class="btn btn-photo" onclick="uploadToCatbox()">Generate Link</button>
        <div id="loaderPhoto" class="loader"></div>
        <div id="resultPhoto"></div>
    </div>
</div>

<script>
    function switchTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // Tool 1: Instagram Downloader
    async function downloadInsta() {
        const url = document.getElementById('instaUrl').value;
        const resDiv = document.getElementById('resultInsta');
        const loader = document.getElementById('loaderInsta');
        
        if(!url) return alert("Paste a URL first!");
        
        resDiv.innerHTML = "";
        loader.style.display = "block";

        const proxy = "https://corsproxy.io/?";
        const api = `https://insta-dl.hazex.workers.dev/?url=${encodeURIComponent(url)}`;

        try {
            const response = await fetch(proxy + encodeURIComponent(api));
            const data = await response.json();
            if(data.error) throw new Error();

            const media = data.result;
            resDiv.innerHTML = `
                <div class="video-box">
                    <video controls src="${media.url}"></video>
                    <p>Quality: ${media.quality} | Size: ${media.formattedSize}</p>
                    <a href="${media.url}" target="_blank" style="color:white; background:#28a745; padding:10px; display:block; border-radius:8px; text-decoration:none;">Download Now</a>
                </div>`;
        } catch(e) {
            resDiv.innerHTML = "<p style='color:red;'>Failed to fetch media.</p>";
        } finally { loader.style.display = "none"; }
    }

    // Tool 2: Photo to Link (Catbox)
    async function uploadToCatbox() {
        const fileInput = document.getElementById('photoFile');
        const resDiv = document.getElementById('resultPhoto');
        const loader = document.getElementById('loaderPhoto');

        if(fileInput.files.length === 0) return alert("Select a file!");

        resDiv.innerHTML = "";
        loader.style.display = "block";

        const formData = new FormData();
        formData.append('reqtype', 'fileupload');
        formData.append('fileToUpload', fileInput.files[0]);

        try {
            // Note: Catbox usually requires a proxy if uploaded directly from browser due to CORS
            const proxy = "https://corsproxy.io/?";
            const response = await fetch(proxy + encodeURIComponent('https://catbox.moe/user/api.php'), {
                method: 'POST',
                body: formData
            });
            const link = await response.text();

            if(link.includes('https')) {
                resDiv.innerHTML = `
                    <div class="link-box">
                        <p>File Uploaded Successfully!</p>
                        <a href="${link.trim()}" target="_blank">${link.trim()}</a>
                    </div>`;
            } else {
                throw new Error();
            }
        } catch(e) {
            resDiv.innerHTML = "<p style='color:red;'>Upload failed. Use the Telegram Bot for large files.</p>";
        } finally { loader.style.display = "none"; }
    }
</script>

</body>
</html>
